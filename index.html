<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Kickoff Countdown</title>

<body>
<div class="container">

    <div class="team">
        <img id="awayLogo">
        <div id="awayTeam" class="team-name"></div>
    </div>

    <div class="center">

        <div class="title">
            TIME UNTIL KICKOFF
        </div>

        <div id="countdown"></div>

        <div class="info">

            <div id="gameDate"></div>

            <div id="location"></div>

        </div>

    </div>

    <div class="team">
        <img id="homeLogo">
        <div id="homeTeam" class="team-name"></div>
    </div>
</div>

<script src="script.st"></script>
</body>
</html>
