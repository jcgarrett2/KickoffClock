<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kickoff Countdown</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="countdownScreen" class="screen">

    <div class="container">

    <div class="team">
        <img id="awayLogo" alt="Away Logo">
        <div id="awayTeam" class="team-name"></div>
    </div>

    <div class="center">

        <div class="title">
            TIME UNTIL KICKOFF
        </div>

        <div id="countdown"></div>

        <div class="info">
            <div id="gameDate"></div>
            <div id="location"></div>
        </div>

    </div>

    <div class="team">
        <img id="homeLogo" alt="Home Logo">
        <div id="homeTeam" class="team-name"></div>
    </div>

</div>

    </div>

    <div id="scheduleScreen" class="screen hidden">

        <div class="schedule-container">

            <div class="center">

                <div class="title">
                    2026 SCHEDULE
                </div>

                <div id="scheduleList"></div>

            </div>
        </div>

    </div>

    <div id="quoteScreen" class="screen hidden">

         <div class="container">

            <div class="center">

                <div id="quoteText" class="quote"></div>

                <div id="quoteAuthor" class="author"></div>

            </div>

        </div>

    </div>



<script src="script.js"></script>

</body>
</html>
